<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPCHAT - Coffee Shop</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Poppins',sans-serif;
  background:#fdfaf5;
  color:#4a342e;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:white;
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-weight:700;
  font-size:20px;
  color:#8d6e63;
  display:flex;
  align-items:center;
  gap:8px;
}

.logo img{
  width:28px;
}

/* NAV */
nav ul{
  display:flex;
  gap:15px;
  list-style:none;
  font-size:14px;
}

nav ul li a{
  text-decoration:none;
  color:#4a342e;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:20px;

  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('bg.jpg') no-repeat center/cover;

  color:white;
}

.hero-text h1{
  font-size:28px;
}

.hero-text p{
  margin-top:10px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:15px;
  padding:10px 25px;
  background:#ff9800;
  color:white;
  border-radius:25px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px #ff9800;
}

/* SHOP */
.shop-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:20px;
  padding:20px;
}

.product-card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.product-card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:#d84315;
  font-weight:bold;
}

/* INFO */
.info-section{
  padding:20px;
  text-align:center;
}

/* RESPONSIVE */
@media(min-width:768px){
  .hero-text h1{
    font-size:45px;
  }

  nav ul{
    gap:30px;
    font-size:16px;
  }

  .product-card img{
    height:150px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/924/924514.png">
    SIPCHAT
  </div>

  <nav>
    <ul>
      <li><a href="#home">HOME</a></li>
      <li><a href="#shop">SHOP</a></li>
      <li><a href="#about">ABOUT</a></li>
      <li><a href="#contact">CONTACT</a></li>
    </ul>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <div class="hero-text">
    <h1>BUILD OUR LOVE<br>CONVERSATION</h1>
    <p>Enjoy best coffee ☕</p>
    <a href="#shop" class="btn">SHOP NOW</a>
  </div>
</section>

<!-- SHOP -->
<section id="shop" class="shop-grid">

  <div class="product-card">
    <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
    <h3>Cold Coffee</h3>
    <p class="price">₹30</p>
  </div>

  <div class="product-card">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
    <h3>Hot Coffee</h3>
    <p class="price">₹30</p>
  </div>

  <div class="product-card">
    <img src="https://images.unsplash.com/photo-1541167760496-1628856ab772">
    <h3>Tea</h3>
    <p class="price">₹20</p>
  </div>

  <div class="product-card">
    <img src="https://images.unsplash.com/photo-1563636619-e9143da7973b">
    <h3>Milk</h3>
    <p class="price">₹30</p>
  </div>

</section>

<!-- ABOUT -->
<section id="about" class="info-section">
  <h2>ABOUT</h2>
  <p>Best coffee shop in Tuticorin ☕</p>
</section>

<!-- CONTACT -->
<section id="contact" class="info-section">
  <h2>CONTACT</h2>
  <p>📍 Tuticorin | 📞 +91 00000</p>
</section>

</body>
</html>
